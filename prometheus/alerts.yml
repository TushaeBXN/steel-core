groups:
  - name: steelcore_alerts
    interval: 30s
    rules:
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
      - alert: APISlowResponse
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API response time > 1s"
      - alert: SandboxExecutionFailure
        expr: rate(sandbox_execution_failures_total[5m]) > 0.1
        for: 2m
        labels:
          severity: high
        annotations:
          summary: "Sandbox execution failures"
