version: '3.8'

services:
  steel-core-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: steel-core-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://steelcore:${DB_PASSWORD}@postgres:5432/steelcore
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    volumes:
      - steelcore-temp:/tmp/steelcore
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  steel-core-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: steel-core-mcp
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - API_URL=http://steel-core-api:3000
      - SANDBOX_TIMEOUT=5000
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=100M

  postgres:
    image: postgres:15-alpine
    container_name: steel-core-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=steelcore
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=steelcore
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U steelcore"]
      interval: 10s

  redis:
    image: redis:7-alpine
    container_name: steel-core-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s

  nginx:
    image: nginx:alpine
    container_name: steel-core-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - steel-core-api

  prometheus:
    image: prom/prometheus:latest
    container_name: steel-core-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/alerts.yml:/etc/prometheus/rules/alerts.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: steel-core-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3001:3000"

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
  steelcore-temp:
