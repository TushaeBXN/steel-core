apiVersion: apps/v1
kind: Deployment
metadata:
  name: steelcore-api
  namespace: steelcore
spec:
  replicas: 3
  selector:
    matchLabels:
      app: steelcore-api
  template:
    metadata:
      labels:
        app: steelcore-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
      - name: api
        image: steelcore/api:latest
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: steelcore-config
        - secretRef:
            name: steelcore-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir:
          sizeLimit: 100Mi
