apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: steelcore-ingress
  namespace: steelcore
  annotations:
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/limit-rps: "10"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - api.steelcore.dev
    secretName: steelcore-tls
  rules:
  - host: api.steelcore.dev
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: steelcore-api-service
            port:
              number: 80
